<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  
  <title>NanoFlix</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://cdn4.iconfinder.com/data/icons/logos-and-brands/512/227_Netflix_logo-512.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://www.youtube.com/iframe_api"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-screen">
    <div class="login-overlay"></div>
    <div class="login-box">
      <h1>NanoFlix</h1>
      <input type="text" id="username" placeholder="Nome utente" onkeypress="handleEnter(event)" />
      <input type="password" id="password" placeholder="Password" onkeypress="handleEnter(event)" />
      <button onclick="login()" class="primary-btn">Entra</button>
      <p id="login-error" style="color: #e50914; margin-top: 15px; min-height: 20px; font-size: 0.9rem;"></p>
    </div>
  </div>

  <div id="main-app" style="display:none;">
    
    <header id="main-header">
      <div class="header-left">
        <div class="logo" onclick="loadHome()">NANOFLIX</div>
        <div class="netflix-nav" onclick="toggleMenu(event)">
          <div class="nav-trigger">Sfoglia <span style="font-size: 0.7rem;">▼</span></div>
          <div class="nav-dropdown" id="nav-menu">
            <div onclick="filterCategory('all')">Home</div>
            <div onclick="filterCategory('series')">Serie TV</div>
            <div onclick="filterCategory('movies')">Film</div>
          </div>
        </div>
      </div>
      <div class="header-right">
        <input type="text" id="search-bar" placeholder="Cerca..." oninput="filterContent()" />
        <span class="logout-btn" onclick="logout()">Esci</span>
      </div>
    </header>

    <div id="hero-section" class="view">
        <div class="hero-content">
            <h1 id="hero-title"></h1>
            <p id="hero-desc"></p>
            <button class="hero-btn primary" id="hero-play-btn">▶ Riproduci</button>
        </div>
    </div>

    <div id="home-view" class="view" style="display:none; padding: 20px 4%;">
      <div id="continue-watching-section" class="category-row" style="display:none;">
          <h2 class="category-title">Continua a guardare</h2>
          <div class="carousel" id="continue-watching-carousel"></div>
      </div>
      <div id="categories-container"></div>
    </div>

    <div id="serie-detail-view" class="view">
      <button class="back-btn-float" onclick="goBack()">← Indietro</button>
      <button class="fullscreen-btn" id="serie-fs-btn" onclick="openTrailerFullscreen()" style="display:none;">⛶ Trailer Intero</button>
      
      <div class="details-hero" id="serie-hero"></div>
      
      <div class="custom-trailer-controls" id="trailer-controls-serie" style="display: none;">
          <button id="trailer-play-pause-serie" class="control-btn">⏸</button>
          <input type="range" id="trailer-progress-serie" class="trailer-progress" min="0" value="0" step="1">
          <span id="trailer-time-serie" class="trailer-time">00:00 / 00:00</span>
          <button id="trailer-mute-serie" class="control-btn">🔊</button>
      </div>

      <div class="details-content">
          <h1 class="details-title" id="season-title">Titolo</h1>
          <p class="details-desc" id="season-desc">Descrizione...</p>
          
          <div class="season-selector-container">
            <select id="season-selector" onchange="changeSeason()"></select>
          </div>
          <ul id="seasons-ul"></ul>
      </div>
    </div>

    <div id="movie-detail-view" class="view">
       <button class="back-btn-float" onclick="goBack()">← Indietro</button>
       <button class="fullscreen-btn" id="movie-fs-btn" onclick="openTrailerFullscreen()" style="display:none;">⛶ Trailer Intero</button>
       
       <div class="details-hero" id="movie-hero"></div>
       
       <div class="custom-trailer-controls" id="trailer-controls-movie" style="display: none;">
           <button id="trailer-play-pause-movie" class="control-btn">⏸</button>
           <input type="range" id="trailer-progress-movie" class="trailer-progress" min="0" value="0" step="1">
           <span id="trailer-time-movie" class="trailer-time">00:00 / 00:00</span>
           <button id="trailer-mute-movie" class="control-btn">🔊</button>
       </div>

       <div class="details-content">
           <h1 class="details-title" id="movie-title">Titolo Film</h1>
           <p class="details-desc" id="movie-desc">Descrizione del film...</p>
           <button class="big-play-btn" id="movie-play-btn">▶ RIPRODUCI IL FILM</button>
       </div>
    </div>

    <div id="episode-list">
      <div class="player-wrapper">
        <div class="player-header">
           <button class="close-btn" onclick="closePlayer()">CHIUDI</button>
           <span id="episode-title" style="margin-left:15px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color: white;"></span>
           <button id="next-ep-btn" class="close-btn" style="display:none; background:#333; margin-left:auto;">PROSSIMO EPISODIO ⏭</button>
        </div>
        <div id="episodes-container" style="flex: 1; width: 100%; position: relative;"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
